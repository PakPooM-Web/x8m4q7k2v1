<!DOCTYPE html>

<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Library</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#171a21">
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
</head>

<body>

<header class="header">
    <h1>🎮 Steam Library</h1>

    <input
        class="search"
        id="search"
        placeholder="ค้นหาเกม...">
</header>

<main class="grid" id="grid"></main>

<div class="modal" id="modal">

    <div class="popup">

        <h2 id="gameTitle"></h2>

        <label class="label" for="username">
            Username
        </label>

    <div class="input-group">

    <input
        id="username"
        type="text"
        readonly
    >

            <button
                class="btn copy"
                onclick="copyText('username')">

                Copy

            </button>
        </div>

        <label class="label" for="password">
             Password
        </label>

    <div class="input-group">
    <input
        id="password"
        type="password"
        readonly
    >

            <button
                class="btn toggle"
                onclick="togglePass()">

                👁

            </button>

            <button
                class="btn copy"
                onclick="copyText('password')">

                Copy

            </button>

        </div>

        <div class="guard-box" id="guardBox">
            <div class="label">Steam Guard</div>

             <p id="guardText"></p>

             <a
                id="guardLink"
                class="guard-link"
                href="#"
                target="_blank">
                วิธีรับ Steam Guard
             </a>
        </div>

        <button
            class="btn close"
            onclick="closeModal()">

            Close

        </button>

    </div>

</div>

<div class="toast" id="toast">
    คัดลอกแล้ว
</div>

<script src="js/script.js"></script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./service-worker.js')
        .then(() => console.log('Service Worker Registered'));
}
</script>

</body>

</html>
